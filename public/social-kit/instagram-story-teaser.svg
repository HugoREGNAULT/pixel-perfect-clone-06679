<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>text { font-family: 'Helvetica Neue', 'Inter', -apple-system, BlinkMacSystemFont, Arial, sans-serif; }</style>
    <radialGradient id="glow-top" cx="80%" cy="10%" r="50%">
      <stop offset="0%"   stop-color="#F5C842" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0D0D0D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-bottom" cx="20%" cy="90%" r="50%">
      <stop offset="0%"   stop-color="#F5C842" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0D0D0D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="#0D0D0D"/>

  <!-- Glow overlays -->
  <rect width="1080" height="1920" fill="url(#glow-top)"/>
  <rect width="1080" height="1920" fill="url(#glow-bottom)"/>

  <!-- Decorative circles — top right -->
  <circle cx="1020" cy="200"  r="280" fill="#141414"/>
  <circle cx="1060" cy="160"  r="160" fill="#F5C842" fill-opacity="0.04"/>
  <circle cx="960"  cy="300"  r="80"  fill="#F5C842" fill-opacity="0.03"/>

  <!-- Decorative circles — bottom left -->
  <circle cx="80"   cy="1750" r="240" fill="#141414"/>
  <circle cx="60"   cy="1780" r="140" fill="#F5C842" fill-opacity="0.05"/>
  <circle cx="180"  cy="1680" r="90"  fill="#F5C842" fill-opacity="0.03"/>

  <!-- Small floating dots -->
  <circle cx="200"  cy="500"  r="3" fill="#F5C842" fill-opacity="0.3"/>
  <circle cx="880"  cy="700"  r="2" fill="#F5C842" fill-opacity="0.2"/>
  <circle cx="150"  cy="1200" r="2.5" fill="#F5C842" fill-opacity="0.25"/>
  <circle cx="950"  cy="1100" r="2" fill="#ffffff" fill-opacity="0.15"/>
  <circle cx="400"  cy="1500" r="3" fill="#F5C842" fill-opacity="0.2"/>

  <!-- ── Logo top ── -->
  <text x="540" y="152" font-size="28" font-weight="800" fill="#FFFFFF" fill-opacity="0.7" text-anchor="middle" letter-spacing="-0.5">springr<tspan fill="#F5C842">.</tspan></text>

  <!-- Tiny separator line -->
  <rect x="430" y="166" width="220" height="1" fill="#ffffff" fill-opacity="0.1"/>

  <!-- ── Main phrase — center ── -->
  <text x="540" y="860"  font-size="74" font-weight="800" letter-spacing="-2" fill="#FFFFFF" text-anchor="middle">Ton prochain</text>
  <text x="540" y="964"  font-size="74" font-weight="800" letter-spacing="-2" fill="#FFFFFF" text-anchor="middle">stage est</text>
  <text x="540" y="1068" font-size="74" font-weight="800" letter-spacing="-2" fill="#FFFFFF" text-anchor="middle">là<tspan fill="#F5C842">.</tspan></text>

  <!-- Yellow accent line above phrase -->
  <rect x="240" y="816" width="600" height="3" fill="#F5C842" fill-opacity="0.2"/>

  <!-- Sub-text -->
  <text x="540" y="1140" font-size="24" font-weight="400" fill="#666666" text-anchor="middle">Trouve. Postule. Décroche.</text>

  <!-- Dots separator -->
  <circle cx="510" cy="1185" r="3" fill="#F5C842" fill-opacity="0.3"/>
  <circle cx="540" cy="1185" r="3" fill="#F5C842" fill-opacity="0.6"/>
  <circle cx="570" cy="1185" r="3" fill="#F5C842" fill-opacity="0.3"/>

  <!-- ── Bottom CTA bar ── -->
  <rect x="0" y="1800" width="1080" height="120" fill="#F5C842"/>

  <!-- Arrow decoration -->
  <text x="540" y="1848" font-size="13" font-weight="700" letter-spacing="4" fill="#0D0D0D" fill-opacity="0.5" text-anchor="middle">INSCRIS-TOI GRATUITEMENT</text>
  <text x="540" y="1896" font-size="34" font-weight="800" fill="#0D0D0D" text-anchor="middle">springr.app →</text>

</svg>
